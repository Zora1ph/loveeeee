<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For The love of my Life</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace; /* Gaming font style */
            overflow: hidden;
        }

        .container {
            background-color: #1a1a1a;
            padding: 50px;
            border-radius: 20px;
            border: 4px solid #ff4d6d;
            text-align: center;
            box-shadow: 0 0 25px #ff4d6d;
            width: 350px;
            transition: all 0.4s ease;
        }

        /* The BIG Sorry Button */
        #sorryBtn {
            background-color: #ff4d6d;
            color: white;
            font-size: 50px; /* Big text */
            font-weight: bold;
            padding: 20px 50px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 0 #a31d36; /* 3D button effect */
            transition: all 0.1s;
            text-transform: uppercase;
        }

        #sorryBtn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #a31d36;
        }

        #description {
            color: #ff4d6d;
            font-size: 12px; /* Small description */
            margin-top: 15px;
            letter-spacing: 2px;
            opacity: 0.8;
            animation: blink 1s infinite; /* Blinking "Press Start" effect */
        }

        @keyframes blink {
            50% { opacity: 0.2; }
        }

        /* Choice Section */
        h2 { color: #ff4d6d; font-size: 24px; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }

        .choice-btn {
            padding: 10px 30px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #ff4d6d;
            cursor: pointer;
            font-weight: bold;
            background: transparent;
            color: #ff4d6d;
        }

        #yesBtn { background: #ff4d6d; color: white; }

        /* Hidden Sections */
        #forgiveSection, #secretMessage { display: none; }

        /* Animations */
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="box">
        <div id="startSection">
            <button id="sorryBtn">SORRY</button>
            <p id="description">press the button</p>
        </div>

        <div id="forgiveSection" class="fade-in">
            <h2>CAN YOU FORGIVE ME?</h2>
            <div class="btn-group">
                <button class="choice-btn" id="yesBtn">YES</button>
                <button class="choice-btn" id="noBtn">NO</button>
            </div>
        </div>

        <div id="secretMessage" class="fade-in">
            <h1 style="color: #ff4d6d;">💖</h1>
            <h2 style="color: #fff; line-height: 1.5;">I'm sorry, I love you so much and I miss you.</h2>
        </div>
    </div>

    <script src="love.js"></script>
</body>
</html>
